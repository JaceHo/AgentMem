<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AgentMem</title>
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header id="hdr">
  <div class="hl">
    <span class="logo">AgentMem</span>
    <span id="dot" class="dot ok"></span>
    <span id="ver" style="font-size:10px;color:var(--text3)">v?</span>
    <span id="emb-info" style="font-size:9px;color:var(--text3);margin-left:4px"></span>
  </div>
  <nav id="tabs">
    <button class="tab" data-t="dashboard">Dashboard</button>
    <button class="tab" data-t="graph">Graph</button>
    <button class="tab" data-t="memories">Memories</button>
    <button class="tab" data-t="timeline">Timeline</button>
    <button class="tab" data-t="sessions">Sessions</button>
    <button class="tab" data-t="procedures">Procedures</button>
    <button class="tab" data-t="search">Search</button>
    <button class="tab" data-t="audit">Audit</button>
    <button class="tab" data-t="activity">Activity</button>
    <button class="tab" data-t="profile">Profile</button>
    <button class="tab" data-t="replay">Replay</button>
    <button class="tab" data-t="logs">Logs</button>
    <button class="tab" data-t="api">API</button>
  </nav>
  <div class="hr">
    <span id="live-cnt" class="live-cnt" style="display:none"><span class="live-dot"></span>LIVE</span>
    <span id="ws-badge" class="badge badge-ws off">OFF</span>
    <button id="theme-btn" class="btn sm" onclick="toggleTheme()">LIGHT</button>
    <button class="btn sm" onclick="showShortcuts()">?</button>
  </div>
</header>

<!-- ═══ MAIN ═══ -->
<main id="main">

  <!-- DASHBOARD -->
  <section id="p-dashboard" class="pane on">
    <div class="g2">
      <div class="card"><div class="ch">Health<span id="uptime" style="float:right;font-size:10px;color:var(--text3)"></span></div><div id="health-info" class="cb"></div></div>
      <div class="card"><div class="ch">Memory Tiers</div><div id="tier-grid" class="g3 cb"></div></div>
    </div>
    <div id="token-bar" style="display:none" class="card"><div class="cb" style="display:flex;align-items:center;gap:10px">
      <span style="font-size:11px;color:var(--green);font-weight:bold" id="tb-pct">0%</span>
      <span style="font-size:10px;color:var(--text2)" id="tb-detail">token savings</span>
    </div></div>
    <div id="hero-area"></div>
    <div id="writer-info"></div>
    <div class="g2">
      <div class="card"><div class="ch">Gauges</div><div id="gauge-area" class="cb"></div></div>
      <div class="card"><div class="ch">Recent Observations</div><div id="dash-obs" class="cb"></div></div>
    </div>
    <div class="card" id="setup-card" style="margin-top:10px">
      <div class="ch" style="cursor:pointer;user-select:none" onclick="toggleSetup()">
        Setup &amp; Agent Config
        <span id="setup-chevron" style="float:right;font-size:10px;color:var(--text3);transition:transform .2s">▼</span>
      </div>
      <div id="setup-body"></div>
    </div>
  </section>

  <!-- GRAPH -->
  <section id="p-graph" class="pane">
    <div class="card" style="position:relative">
      <div class="ch">Knowledge Graph <span id="ginfo" style="font-size:10px;color:var(--text3)"></span>
        <div style="float:right;display:flex;gap:4px">
          <input id="gq" placeholder="Search entities..." style="font-size:11px;padding:2px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:160px">
          <button class="btn sm pri" onclick="loadGraph()">Go</button>
          <button class="btn sm" onclick="gZoom(1.2)">+</button>
          <button class="btn sm" onclick="gZoom(.8)">-</button>
          <button class="btn sm" onclick="gReset()">Reset</button>
          <button class="btn sm" onclick="toggleGSidebar()">Filters</button>
        </div>
      </div>
      <canvas id="gcanvas" width="900" height="500" style="width:100%;border-radius:var(--radius);cursor:grab"></canvas>
      <div id="glegend" style="display:flex;gap:12px;padding:6px 0;font-size:10px"></div>
      <div id="g-sidebar" class="sidebar">
        <div style="font-size:10px;font-weight:bold;margin-bottom:6px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em">Filters</div>
        <div id="g-filters"></div>
        <div id="g-sidebar-info" style="margin-top:10px"></div>
      </div>
    </div>
  </section>

  <!-- MEMORIES -->
  <section id="p-memories" class="pane">
    <div class="card">
      <div class="ch">Memories
        <div style="float:right;display:flex;gap:4px">
          <input id="mq" placeholder="Search memories..." style="font-size:11px;padding:2px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:200px">
          <select id="mtier" style="font-size:11px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)">
            <option value="semantic">Facts</option><option value="episodes">Episodes</option><option value="procedural">Procedures</option><option value="memories">All</option>
          </select>
          <select id="mcat" style="font-size:11px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)">
            <option value="">All categories</option><option value="fact">Fact</option><option value="episode">Episode</option><option value="procedure">Procedure</option><option value="preference">Preference</option><option value="rule">Rule</option><option value="identity">Identity</option>
          </select>
          <button class="btn sm pri" onclick="loadMem()">Search</button>
        </div>
      </div>
      <div id="mlist" class="cb"></div>
    </div>
  </section>

  <!-- TIMELINE -->
  <section id="p-timeline" class="pane">
    <div class="card">
      <div class="ch">Timeline
        <div style="float:right;display:flex;gap:4px">
          <input id="tlq" placeholder="recent activity" style="font-size:11px;padding:2px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:200px">
          <select id="tl-sess" style="font-size:11px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"></select>
          <button class="btn sm pri" onclick="loadTL()">Load</button>
        </div>
      </div>
      <div id="tllist" class="cb"></div>
    </div>
  </section>

  <!-- SESSIONS -->
  <section id="p-sessions" class="pane">
    <div class="card">
      <div class="ch">Sessions</div>
      <div id="slist" class="cb"></div>
    </div>
  </section>

  <!-- PROCEDURES -->
  <section id="p-procedures" class="pane">
    <div class="card">
      <div class="ch">Procedures
        <div style="float:right;display:flex;gap:4px">
          <input id="pq" placeholder="Search procedures..." style="font-size:11px;padding:2px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:200px">
          <button class="btn sm pri" onclick="loadProcs()">Search</button>
        </div>
      </div>
      <div id="plist" class="cb"></div>
    </div>
  </section>

  <!-- SEARCH -->
  <section id="p-search" class="pane">
    <div class="card">
      <div class="ch">Hybrid Search
        <div style="float:right;display:flex;gap:4px">
          <input id="sq" placeholder="Search everything..." style="font-size:11px;padding:2px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:240px" onkeydown="if(event.key==='Enter')doSearch()">
          <select id="smode" style="font-size:11px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)">
            <option value="hybrid">Hybrid (BM25+Vec+Graph)</option><option value="vector">Vector only</option><option value="bm25">BM25 only</option><option value="graph">Graph only</option>
          </select>
          <input id="slimit" value="20" style="font-size:11px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:50px">
          <button class="btn sm pri" onclick="doSearch()">Search</button>
        </div>
      </div>
      <div id="sresults" class="cb"></div>
    </div>
  </section>

  <!-- AUDIT -->
  <section id="p-audit" class="pane">
    <div class="card">
      <div class="ch">Audit Log</div>
      <div id="audit-list" class="cb"></div>
    </div>
  </section>

  <!-- ACTIVITY -->
  <section id="p-activity" class="pane">
    <div class="card">
      <div class="ch">Activity Feed</div>
      <div id="act-list" class="cb"></div>
    </div>
  </section>

  <!-- PROFILE -->
  <section id="p-profile" class="pane">
    <div class="g2">
      <div class="card"><div class="ch">Persona Profile</div><div id="profile-fields" class="cb"></div></div>
      <div class="card"><div class="ch">Configuration</div><div id="profile-config" class="cb"></div></div>
    </div>
  </section>

  <!-- REPLAY -->
  <section id="p-replay" class="pane">
    <div class="card">
      <div class="ch">Session Replay
        <div style="float:right;display:flex;gap:4px;align-items:center">
          <select id="rp-sess" style="font-size:11px;padding:2px 4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text)"></select>
          <button class="btn sm pri" onclick="startReplay()">Load</button>
        </div>
      </div>
      <div class="rp-controls" style="display:flex;align-items:center;gap:8px;padding:8px 0">
        <button class="btn sm" onclick="rpPrev()">PREV</button>
        <button id="rp-play-btn" class="btn sm pri" onclick="rpPlay()">PLAY</button>
        <button class="btn sm" onclick="rpNext()">NEXT</button>
        <span style="font-size:10px;color:var(--text3)"><span id="rp-current">0</span> / <span id="rp-total">0</span></span>
        <div style="flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden"><div id="rp-fill" style="height:100%;width:0%;background:var(--accent);transition:width .2s"></div></div>
        <div style="display:flex;gap:2px">
          <button class="btn sm" onclick="rpSpeed(.5)">0.5x</button>
          <button class="btn sm" onclick="rpSpeed(1)">1x</button>
          <button class="btn sm" onclick="rpSpeed(2)">2x</button>
          <button class="btn sm" onclick="rpSpeed(4)">4x</button>
        </div>
        <span id="rp-speed-label" style="font-size:10px;color:var(--text3)">1x</span>
      </div>
      <div id="rp-steps" class="cb"></div>
    </div>
  </section>

  <!-- LOGS -->
  <section id="p-logs" class="pane">
    <div class="card">
      <div class="ch">Logs <span id="log-ct" style="font-size:10px;color:var(--text3)">0</span>
        <button class="btn sm" style="float:right" onclick="clearLogs()">Clear</button>
      </div>
      <div id="lbox" class="cb" style="max-height:70vh;overflow-y:auto;font-family:var(--mono);font-size:10px"></div>
    </div>
  </section>

  <!-- API REFERENCE -->
  <section id="p-api" class="pane">
    <div class="card">
      <div class="ch">API Reference
        <div style="float:right;display:flex;gap:4px">
          <input id="api-filter" placeholder="Filter endpoints..." style="font-size:11px;padding:2px 6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:200px" oninput="loadAPI()">
        </div>
      </div>
      <div id="api-list" class="cb"></div>
    </div>
  </section>

</main>

<!-- ═══ MODAL ═══ -->
<div id="modal-bg" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal"><button class="modal-x" onclick="closeModal()">&times;</button><div id="modal-body"></div></div>
</div>

<!-- ═══ JS MODULES ═══ -->
<script src="/js/app.js"></script>
<script src="/js/ws.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/graph.js"></script>
<script src="/js/memories.js"></script>
<script src="/js/timeline.js"></script>
<script src="/js/sessions.js"></script>
<script src="/js/procedures.js"></script>
<script src="/js/search.js"></script>
<script src="/js/audit.js"></script>
<script src="/js/activity.js"></script>
<script src="/js/profile.js"></script>
<script src="/js/replay.js"></script>
<script src="/js/logs.js"></script>
<script src="/js/api-ref.js"></script>
</body>
</html>
