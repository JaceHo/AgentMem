services:
  redis:
    image: redis/redis-stack-server:8.0
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agentmem:
    build: .
    ports:
      - "127.0.0.1:18800:18800"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18800/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
